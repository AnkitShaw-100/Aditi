<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logon | ADITI</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="logon-page">
    <main class="logon-shell">
      <a class="brand logon-brand" href="index.html#home" aria-label="ADITI home">
        <img src="media/optimized/aditi-logo-mark.png" alt="" />
        <span>ADITI</span>
      </a>

      <section class="logon-card">
        <p class="kicker">Member Logon</p>
        <h1>Access paid dispatches</h1>
        <p>
          Paid ADITI dispatches are sold individually at &#8377;350. Log on to continue
          to checkout and unlock the selected article.
        </p>

        <form class="logon-form">
          <label for="logon-email">Email</label>
          <input id="logon-email" type="email" placeholder="you@example.com" autocomplete="email" />
          <label for="logon-password">Password</label>
          <input id="logon-password" type="password" placeholder="Password" autocomplete="current-password" />
          <button type="submit">Continue</button>
        </form>

        <a class="article-back" href="index.html#dispatches">Back to Dispatches</a>
      </section>
    </main>
  </body>
</html>
